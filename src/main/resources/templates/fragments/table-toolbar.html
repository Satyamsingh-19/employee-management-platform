<div class="table-toolbar" th:fragment="tableToolbar(placeholder)">
    <div class="table-search flex-grow-1">
        <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="search" class="form-control" th:attr="data-table-search=true,placeholder=${placeholder}">
        </div>
    </div>
    <div class="d-flex align-items-center gap-2">
        <label class="small text-muted mb-0">Rows</label>
        <select class="form-select form-select-sm" style="width: auto;" data-table-size>
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="25">25</option>
        </select>
    </div>
</div>
