<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in | PeopleFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">
<div class="auth-card shadow-lg rounded-4 p-4 p-md-5">
    <a th:href="@{/}" class="text-decoration-none small text-muted">&larr; Back to welcome page</a>
    <div class="auth-brand mt-4 mb-3"><i class="bi bi-shield-lock"></i></div>
    <h1 class="h2 fw-bold">Welcome back</h1>
    <p class="text-muted mb-4">Sign in to manage your people operations.</p>
    <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>
    <div th:if="${param.logout}" class="alert alert-success">You have been signed out.</div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <form th:action="@{/login}" method="post" class="vstack gap-3">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div>
            <label for="username" class="form-label">Username</label>
            <input id="username" name="username" class="form-control" autocomplete="username" required autofocus>
        </div>
        <div>
            <label for="password" class="form-label">Password</label>
            <input id="password" name="password" type="password" class="form-control" autocomplete="current-password" required>
        </div>
        <button class="btn btn-primary w-100 py-2" type="submit">Sign in</button>
    </form>
    <p class="text-center mt-4 mb-0 text-muted">New here? <a th:href="@{/register}">Create an account</a></p>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
