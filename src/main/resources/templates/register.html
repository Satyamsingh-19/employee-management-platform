<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create account | PeopleFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">
<div class="auth-card shadow-lg rounded-4 p-4 p-md-5">
    <a th:href="@{/}" class="text-decoration-none small text-muted">&larr; Back to welcome page</a>
    <div class="auth-brand mt-4 mb-3"><i class="bi bi-person-plus"></i></div>
    <h1 class="h2 fw-bold">Create your account</h1>
    <p class="text-muted">New accounts receive standard employee access.</p>
    <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="vstack gap-3">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger" th:each="error : ${#fields.globalErrors()}" th:text="${error}"></div>
        <div>
            <label for="username" class="form-label">Username</label>
            <input id="username" th:field="*{username}" class="form-control" required>
            <div class="text-danger small mt-1" th:errors="*{username}"></div>
        </div>
        <div>
            <label for="email" class="form-label">Email</label>
            <input id="email" th:field="*{email}" type="email" class="form-control" required>
            <div class="text-danger small mt-1" th:errors="*{email}"></div>
        </div>
        <div>
            <label for="password" class="form-label">Password</label>
            <input id="password" th:field="*{password}" type="password" class="form-control" required>
            <div class="text-danger small mt-1" th:errors="*{password}"></div>
        </div>
        <button class="btn btn-primary w-100 py-2" type="submit">Create account</button>
    </form>
    <p class="text-center mt-4 mb-0 text-muted">Already registered? <a th:href="@{/login}">Sign in</a></p>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
