<!DOCTYPE html>
<html th:replace="~{layout :: layout(${pageTitle}, ~{::section})}">
<section>
    <div class="card p-5 text-center">
        <i class="bi bi-exclamation-triangle text-warning display-4 mb-3"></i>
        <h1 class="h3" th:text="${pageTitle}">Error</h1>
        <p class="text-muted mb-4" th:text="${errorMessage}">Something went wrong.</p>
        <a th:href="@{/dashboard}" class="btn btn-primary">Back to dashboard</a>
    </div>
</section>
</html>
