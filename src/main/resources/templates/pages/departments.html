<!DOCTYPE html>
<html th:replace="~{layout :: layout(${pageTitle}, ~{::section})}">
<section>
    <div class="page-heading">
        <div>
            <h1>Departments</h1>
            <p>Organize the teams that make your company work.</p>
        </div>
        <a sec:authorize="hasAnyRole('ADMIN','HR')" th:href="@{/departments/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>New department
        </a>
    </div>
    <div class="card data-table-wrapper">
        <div th:replace="~{fragments/table-toolbar :: tableToolbar('Search departments...')}"></div>
        <div class="table-responsive">
            <table class="table align-middle mb-0" data-table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Code</th>
                        <th>Description</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${departments}">
                        <td class="fw-semibold" th:text="${item.name}"></td>
                        <td><span class="badge text-bg-light" th:text="${item.code}"></span></td>
                        <td th:text="${item.description} ?: '-'"></td>
                        <td class="text-end" sec:authorize="hasAnyRole('ADMIN','HR')">
                            <a th:href="@{/departments/{id}/edit(id=${item.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                            <form th:action="@{/departments/{id}/delete(id=${item.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(departments)}" data-empty-row>
                        <td colspan="4" class="text-center text-muted py-4">No departments found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:replace="~{fragments/table-pagination :: tablePagination}"></div>
    </div>
</section>
</html>
