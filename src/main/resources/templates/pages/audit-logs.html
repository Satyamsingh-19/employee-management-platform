<!DOCTYPE html>
<html th:replace="~{layout :: layout(${pageTitle}, ~{::section})}">
<section>
    <div class="page-heading">
        <div>
            <h1>Audit logs</h1>
            <p>Review recorded application activity.</p>
        </div>
    </div>
    <div class="card data-table-wrapper">
        <div th:replace="~{fragments/table-toolbar :: tableToolbar('Search audit logs...')}"></div>
        <div class="table-responsive">
            <table class="table align-middle mb-0" data-table>
                <thead>
                    <tr>
                        <th>When</th>
                        <th>User</th>
                        <th>Action</th>
                        <th>Entity</th>
                        <th>ID</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${audits}">
                        <td th:text="${item.changedAt}"></td>
                        <td th:text="${item.changedBy}"></td>
                        <td><span class="badge text-bg-light" th:text="${item.action}"></span></td>
                        <td th:text="${item.entityName}"></td>
                        <td th:text="${item.entityId}"></td>
                        <td th:text="${item.details}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(audits)}" data-empty-row>
                        <td colspan="6" class="text-center text-muted py-4">No audit records found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:replace="~{fragments/table-pagination :: tablePagination}"></div>
    </div>
</section>
</html>
