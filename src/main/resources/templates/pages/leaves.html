<!DOCTYPE html>
<html th:replace="~{layout :: layout(${pageTitle}, ~{::section})}">
<section>
    <div class="page-heading">
        <div>
            <h1>Leave requests</h1>
            <p>Submit, review, and resolve time-off requests.</p>
        </div>
        <a th:href="@{/leaves/new}" class="btn btn-primary">
            <i class="bi bi-calendar-plus me-1"></i>New request
        </a>
    </div>
    <div class="card data-table-wrapper">
        <div th:replace="~{fragments/table-toolbar :: tableToolbar('Search leave requests...')}"></div>
        <div class="table-responsive">
            <table class="table align-middle mb-0" data-table>
                <thead>
                    <tr>
                        <th>Employee</th>
                        <th>Type</th>
                        <th>Dates</th>
                        <th>Status</th>
                        <th>Approver</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${leaves}">
                        <td class="fw-semibold" th:text="${item.employeeName}"></td>
                        <td th:text="${item.type}"></td>
                        <td th:text="${item.startDate + ' to ' + item.endDate}"></td>
                        <td>
                            <span class="badge status-badge"
                                  th:classappend="${item.status == 'APPROVED'} ? ' approved' : (${item.status == 'REJECTED'} ? ' rejected' : ' pending')"
                                  th:text="${item.status}"></span>
                        </td>
                        <td th:text="${item.approvedBy} ?: '-'"></td>
                        <td class="text-end">
                            <a sec:authorize="hasAnyRole('ADMIN','HR')" th:href="@{/leaves/{id}/edit(id=${item.id})}"
                               class="btn btn-sm btn-outline-primary">Edit</a>
                            <form sec:authorize="hasAnyRole('ADMIN','HR','MANAGER')"
                                  th:action="@{/leaves/{id}/approve(id=${item.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="btn btn-sm btn-outline-success" type="submit">Approve</button>
                            </form>
                            <form sec:authorize="hasAnyRole('ADMIN','HR','MANAGER')"
                                  th:action="@{/leaves/{id}/reject(id=${item.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="btn btn-sm btn-outline-warning" type="submit">Reject</button>
                            </form>
                            <form sec:authorize="hasAnyRole('ADMIN','HR')"
                                  th:action="@{/leaves/{id}/delete(id=${item.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(leaves)}" data-empty-row>
                        <td colspan="6" class="text-center text-muted py-4">No leave requests found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:replace="~{fragments/table-pagination :: tablePagination}"></div>
    </div>
</section>
</html>
