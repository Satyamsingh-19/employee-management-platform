<!DOCTYPE html>
<html th:replace="~{layout :: layout(${pageTitle}, ~{::section})}">
<section>
    <div class="page-heading">
        <div>
            <h1>Employees</h1>
            <p>Keep employee details and reporting lines current.</p>
        </div>
        <a sec:authorize="hasAnyRole('ADMIN','HR')" th:href="@{/employees/new}" class="btn btn-primary">
            <i class="bi bi-person-plus me-1"></i>New employee
        </a>
    </div>
    <div class="card data-table-wrapper">
        <div th:replace="~{fragments/table-toolbar :: tableToolbar('Search employees...')}"></div>
        <div class="table-responsive">
            <table class="table align-middle mb-0" data-table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Username</th>
                        <th>Department</th>
                        <th>Job title</th>
                        <th>Status</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${employees}">
                        <td>
                            <strong th:text="${item.firstName + ' ' + item.lastName}"></strong>
                            <small class="d-block text-muted" th:text="${item.email}"></small>
                        </td>
                        <td th:text="${item.username}"></td>
                        <td th:text="${item.department} ?: '-'"></td>
                        <td th:text="${item.jobTitle} ?: '-'"></td>
                        <td>
                            <span class="badge status-badge"
                                  th:classappend="${item.status == 'ACTIVE'} ? ' active' : ' inactive'"
                                  th:text="${item.status}"></span>
                        </td>
                        <td class="text-end" sec:authorize="hasAnyRole('ADMIN','HR')">
                            <a th:href="@{/employees/{id}/edit(id=${item.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                            <form th:action="@{/employees/{id}/delete(id=${item.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(employees)}" data-empty-row>
                        <td colspan="6" class="text-center text-muted py-4">No employee records found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:replace="~{fragments/table-pagination :: tablePagination}"></div>
    </div>
</section>
</html>
