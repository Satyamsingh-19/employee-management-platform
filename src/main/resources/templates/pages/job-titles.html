<!DOCTYPE html>
<html th:replace="~{layout :: layout(${pageTitle}, ~{::section})}">
<section>
    <div class="page-heading">
        <div>
            <h1>Job titles</h1>
            <p>Maintain consistent roles and career levels.</p>
        </div>
        <a sec:authorize="hasAnyRole('ADMIN','HR')" th:href="@{/job-titles/new}" class="btn btn-primary">
            <i class="bi bi-briefcase me-1"></i>New job title
        </a>
    </div>
    <div class="card data-table-wrapper">
        <div th:replace="~{fragments/table-toolbar :: tableToolbar('Search job titles...')}"></div>
        <div class="table-responsive">
            <table class="table align-middle mb-0" data-table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Level</th>
                        <th>Description</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${jobTitles}">
                        <td class="fw-semibold" th:text="${item.name}"></td>
                        <td th:text="${item.level} ?: '-'"></td>
                        <td th:text="${item.description} ?: '-'"></td>
                        <td class="text-end" sec:authorize="hasAnyRole('ADMIN','HR')">
                            <a th:href="@{/job-titles/{id}/edit(id=${item.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                            <form th:action="@{/job-titles/{id}/delete(id=${item.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(jobTitles)}" data-empty-row>
                        <td colspan="4" class="text-center text-muted py-4">No job titles found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:replace="~{fragments/table-pagination :: tablePagination}"></div>
    </div>
</section>
</html>
