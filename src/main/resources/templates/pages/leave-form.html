<!DOCTYPE html>
<html th:replace="~{layout :: layout(${pageTitle}, ~{::section})}">
<section>
    <div class="page-heading">
        <div>
            <h1 th:text="${pageTitle}"></h1>
            <p>Record the dates and reason for leave.</p>
        </div>
        <a th:href="@{/leaves}" class="btn btn-outline-secondary">Back</a>
    </div>
    <div class="card form-card">
        <div class="card-body">
            <form th:action="@{/leaves/save}" th:object="${leave}" method="post" class="row g-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" th:field="*{id}">
                <div th:if="${#fields.hasGlobalErrors()}" class="col-12 alert alert-danger" th:each="error : ${#fields.globalErrors()}" th:text="${error}"></div>
                <div class="col-md-6">
                    <label class="form-label">Employee</label>
                    <select th:field="*{employeeId}" class="form-select" required>
                        <option value="">Select employee</option>
                        <option th:each="e : ${employees}" th:value="${e.id}" th:text="${e.firstName + ' ' + e.lastName}"></option>
                    </select>
                    <div class="text-danger small" th:errors="*{employeeId}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Type</label>
                    <select th:field="*{type}" class="form-select" required>
                        <option value="VACATION">Vacation</option>
                        <option value="SICK">Sick</option>
                        <option value="PERSONAL">Personal</option>
                        <option value="OTHER">Other</option>
                    </select>
                    <div class="text-danger small" th:errors="*{type}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Start date</label>
                    <input th:field="*{startDate}" type="date" class="form-control" required>
                    <div class="text-danger small" th:errors="*{startDate}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">End date</label>
                    <input th:field="*{endDate}" type="date" class="form-control" required>
                    <div class="text-danger small" th:errors="*{endDate}"></div>
                </div>
                <div class="col-12">
                    <label class="form-label">Reason</label>
                    <textarea th:field="*{reason}" class="form-control" rows="4"></textarea>
                    <div class="text-danger small" th:errors="*{reason}"></div>
                </div>
                <div class="col-12"><button class="btn btn-primary" type="submit">Save request</button></div>
            </form>
        </div>
    </div>
</section>
</html>
