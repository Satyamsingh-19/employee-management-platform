<!DOCTYPE html>
<html th:replace="~{layout :: layout(${pageTitle}, ~{::section})}">
<section>
    <div class="page-heading">
        <div>
            <h1 th:text="${pageTitle}"></h1>
            <p>Connect an account to its employee record.</p>
        </div>
        <a th:href="@{/employees}" class="btn btn-outline-secondary">Back</a>
    </div>
    <div class="card form-card">
        <div class="card-body">
            <form th:action="@{/employees/save}" th:object="${employee}" method="post" class="row g-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" th:field="*{id}">
                <div class="col-12"><p class="form-section-title mb-0">Employee details</p></div>
                <div class="col-md-6">
                    <label class="form-label">User account</label>
                    <select th:field="*{userId}" class="form-select" required>
                        <option value="">Select account</option>
                        <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.username + ' (' + u.email + ')'}"></option>
                    </select>
                    <div class="text-danger small" th:errors="*{userId}"></div>
                </div>
                <div class="col-md-3">
                    <label class="form-label">First name</label>
                    <input th:field="*{firstName}" class="form-control" required>
                    <div class="text-danger small" th:errors="*{firstName}"></div>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Last name</label>
                    <input th:field="*{lastName}" class="form-control" required>
                    <div class="text-danger small" th:errors="*{lastName}"></div>
                </div>
                <div class="col-md-3"><label class="form-label">Date of birth</label><input th:field="*{dateOfBirth}" type="date" class="form-control"></div>
                <div class="col-md-3"><label class="form-label">Hire date</label><input th:field="*{hireDate}" type="date" class="form-control"></div>
                <div class="col-md-3">
                    <label class="form-label">Department</label>
                    <select th:field="*{departmentId}" class="form-select">
                        <option value="">None</option>
                        <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Job title</label>
                    <select th:field="*{jobTitleId}" class="form-select">
                        <option value="">None</option>
                        <option th:each="j : ${jobTitles}" th:value="${j.id}" th:text="${j.name}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Manager</label>
                    <select th:field="*{managerId}" class="form-select">
                        <option value="">None</option>
                        <option th:each="m : ${managers}" th:value="${m.id}" th:text="${m.firstName + ' ' + m.lastName}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Status</label>
                    <select th:field="*{status}" class="form-select">
                        <option value="ACTIVE">Active</option>
                        <option value="INACTIVE">Inactive</option>
                        <option value="ON_LEAVE">On leave</option>
                    </select>
                </div>
                <div class="col-md-4"><label class="form-label">Contact number</label><input th:field="*{contactNumber}" class="form-control"></div>
                <div class="col-12"><label class="form-label">Address</label><input th:field="*{address}" class="form-control"></div>
                <div class="col-12"><button class="btn btn-primary" type="submit">Save employee</button></div>
            </form>
        </div>
    </div>
</section>
</html>
