# MySQL datasource (Docker: employee-mysql on localhost:3306)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/employee_management?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Server
server.port=${SERVER_PORT:8080}

# JWT
jwt.secret=${JWT_SECRET:ReplaceThisSecretKeyForProductionReplaceThisSecretKeyForProduction}
jwt.expiration-ms=900000
jwt.refresh-expiration-ms=86400000

# Actuator
management.endpoints.web.exposure.include=health,info
