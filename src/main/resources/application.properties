# =========================

# DATABASE CONFIGURATION

# =========================

spring.datasource.url=${DB_URL:jdbc:mysql://employee-mysql:3306/employee_management?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================

# JPA / HIBERNATE

# =========================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =========================

# SERVER

# =========================

server.port=${SERVER_PORT:8080}

# =========================

# JACKSON

# =========================

spring.jackson.serialization.write-dates-as-timestamps=false

# =========================

# JWT

# =========================

jwt.secret=${JWT_SECRET:ReplaceThisSecretKeyForProductionReplaceThisSecretKeyForProduction}
jwt.expiration-ms=900000
jwt.refresh-expiration-ms=86400000

# =========================

# ACTUATOR

# =========================

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# =========================

# LOGGING

# =========================

logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=ERROR
